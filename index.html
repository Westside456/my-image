<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nikita Roblox Fan Page</title>
  <meta name="description" content="A simple page about Nikita Roblox being a good YouTuber with 5000k fans." />
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1f2a44, #243b64);
      color: #ffffff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.8rem, 3.6vw, 2.5rem);
    }

    p {
      margin: 0 0 14px;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .highlight {
      font-weight: 700;
      color: #ffd54a;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Nikita Roblox</h1>
    <p>Nikita Roblox is a good YouTuber who makes fun and exciting videos.</p>
    <p>
      This fan page celebrates Nikita Roblox and their amazing community of
      <span class="highlight">5000k fans</span>.
    </p>
    <p>Thanks for visiting this simple GitHub Pages website.</p>
  </main>
</body>
</html>
