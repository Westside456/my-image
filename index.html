<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nikita Roblox Fan Page</title>
  <meta name="description" content="A simple page about Nikita Roblox being a good YouTuber with 5000k fans." />
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #2d4f87, #16233d 55%);
      color: #f5f8ff;
      padding: 24px 16px 40px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
    }

    .hero {
      background: rgba(9, 14, 25, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.5px;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.65;
      font-size: 1.05rem;
    }

    .highlight {
      font-weight: 700;
      color: #ffd45c;
    }

    .gallery-title {
      margin: 24px 0 14px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .gallery {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .photo-card {
      margin: 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .photo-card figcaption {
      padding: 10px 12px;
      font-size: 0.95rem;
      text-align: center;
      color: #e8efff;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Nikita Roblox</h1>
      <p>Nikita Roblox is a good YouTuber who makes fun and exciting videos.</p>
      <p>
        This fan page celebrates Nikita Roblox and an amazing community of
        <span class="highlight">5000k fans</span>.
      </p>
      <p>Welcome to this upgraded GitHub Pages fan website.</p>
    </section>

    <h2 class="gallery-title">Nikita Photo Gallery</h2>
    <section class="gallery">
      <figure class="photo-card">
        <img src="images/nikita-1.png" alt="Nikita outdoors smiling" />
        <figcaption>Nikita outside on a sunny day.</figcaption>
      </figure>
      <figure class="photo-card">
        <img src="images/nikita-2.png" alt="Nikita indoors smiling" />
        <figcaption>Nikita at home with a bright smile.</figcaption>
      </figure>
      <figure class="photo-card">
        <img src="images/nikita-3.png" alt="Nikita relaxing with a dog" />
        <figcaption>Nikita relaxing with a dog friend.</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
